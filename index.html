</div>

<div class="form-row">
<div class="form-group col-md-6">
<label for="Address">Address</label> *

</div>

<div class="form-row">

<div class="form-group col-md-2">

<div class="form-group col-md-3">

</div>
</div>

<div class="form-row">

<input type="email" class="form-control" id="Email" name="Email" required>
</div>
</div>

<div class="form-row">
<div class="form-group col-md-6">

<div class="form-group col-md-6">

</div>
</div>

<input type="hidden" id="CompanyCode" name="CompanyCode" value="UCP-3MUI5H-149P9C-149P9C">

<input type="hidden" name="RedirectUrl" value="https://baileyminter-droid.github.io/thankyou.html">

<button type="submit" class="btn btn-primary">Submit</button>

</div>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>

/* ZIP ROUTING */
const zipRouting = [
{ min:15000, max:15999, code:"UCP-3MUI5H-149P9C-149P9C" },
{ min:16000, max:16999, code:"SECOND-COMPANY-CODE" },
{ min:17000, max:17999, code:"THIRD-COMPANY-CODE" }
];

function getCompanyCode(zip){

zip=parseInt(zip);

for(const zone of zipRouting){

if(zip>=zone.min && zip<=zone.max){
return zone.code;
}

}

return "UCP-3MUI5H-149P9C-149P9C";

}

document.getElementById("webleadform").addEventListener("submit",function(){

const zip=document.getElementById("Zip").value;

document.getElementById("CompanyCode").value=getCompanyCode(zip);

});

</script>
